{{- if and .Values.ingress.enabled .Values.ttyd.enabled }}
{{- $vmCount := .Values.replicaCount | int -}}
{{- range $i := until $vmCount }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "student-lab.vmName" (merge (dict "index" $i) $) }}-ttyd
  namespace: {{ include "student-lab.namespace" $ }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: {{ $.Values.ingress.clusterIssuer | default "selfsigned" }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  tls:
    - hosts:
        - vm-{{ $i }}-{{ $.Release.Name }}.{{ $.Values.ingress.hostBase }}
      secretName: ttyd-tls-{{ $.Release.Name }}-{{ $i }}
  rules:
    - host: vm-{{ $i }}-{{ $.Release.Name }}.{{ $.Values.ingress.hostBase }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "student-lab.vmName" (merge (dict "index" $i) $) }}-ttyd
                port:
                  number: {{ $.Values.ttyd.port }}
---
{{- end }}
{{- end }}
